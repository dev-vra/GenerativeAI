name: Deploy Bonini Engenharia → GitHub Pages

on:
  push:
    branches:
      - claude/bonini-engenharia-website-KLT1c
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gh-pages-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: bonini-engenharia/package-lock.json

      - name: Install dependencies
        working-directory: bonini-engenharia
        run: npm ci

      - name: Build static export
        working-directory: bonini-engenharia
        run: npm run build
        env:
          NODE_ENV: production

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: bonini-engenharia/out
          publish_branch: gh-pages
          force_orphan: true
